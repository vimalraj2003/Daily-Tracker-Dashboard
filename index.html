<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warehouse Hourly Tracker</title>
<style>
  :root{
    --bg:#0f1115; --panel:#1a1d24; --accent:#f5a623; --text:#eee; --muted:#9aa0a6;
    --green:#4caf50; --red:#e25555;
  }
  *{box-sizing:border-box; font-family:'Space Grotesk', Arial, sans-serif;}
  body{margin:0; background:var(--bg); color:var(--text); padding:16px;}
  h1{font-size:1.3rem; margin-bottom:4px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px;}
  .tab{padding:8px 16px; background:var(--panel); border-radius:8px; cursor:pointer; border:1px solid #2a2e37;}
  .tab.active{border-color:var(--accent); color:var(--accent);}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:var(--panel); border-radius:10px; padding:16px; margin-bottom:12px; border:1px solid #2a2e37;}
  label{display:block; margin-bottom:4px; font-size:0.85rem; color:var(--muted);}
  select, input{padding:8px; border-radius:6px; border:1px solid #333; background:#11141a; color:var(--text); font-size:0.95rem;}
  button{padding:10px 16px; border:none; border-radius:6px; background:var(--accent); color:#111; font-weight:bold; font-size:0.95rem; cursor:pointer;}
  button.secondary{background:#2a2e37; color:var(--text);}
  button:disabled{opacity:0.5;}
  .msg{margin-top:8px; font-size:0.9rem; text-align:center;}
  table{width:100%; border-collapse:collapse; font-size:0.85rem;}
  th,td{padding:6px 8px; border-bottom:1px solid #2a2e37; text-align:left;}
  th{color:var(--muted); font-size:0.75rem;}
  .small{font-size:0.8rem; color:var(--muted);}

  /* GRID ENTRY */
  .grid-wrap{overflow-x:auto;}
  .grid-table{width:100%; border-collapse:collapse; min-width:700px;}
  .grid-table th{position:sticky; top:0; background:var(--panel); white-space:nowrap; text-align:center; padding:8px 4px;}
  .grid-table th.worker-col, .grid-table td.worker-col{position:sticky; left:0; background:var(--panel); text-align:left; min-width:140px; z-index:2;}
  .grid-table td{padding:4px; text-align:center; border:1px solid #2a2e37;}
  .grid-table input[type=number]{width:55px; text-align:center; padding:6px 2px;}
  .grid-table input[type=text]{width:130px;}
  .grid-table select{width:80px; font-size:0.8rem;}
  .row-actions{display:flex; gap:4px; align-items:center;}
  .remove-btn{background:var(--red); color:#fff; border:none; border-radius:4px; width:24px; height:24px; cursor:pointer; font-weight:bold;}
  .toolbar{display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap;}

  /* DASHBOARD */
  .bar-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .bar-label{width:110px; font-size:0.8rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar-track{flex:1; background:#11141a; border-radius:4px; height:18px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--accent); display:flex; align-items:center; padding-left:6px; font-size:0.75rem; color:#111; font-weight:bold; white-space:nowrap;}

  /* PROJECTOR DASHBOARD */
  .dash-header{display:flex; align-items:flex-end; gap:16px; margin-bottom:16px; flex-wrap:wrap;}
  .live-clock{margin-left:auto; font-size:1.8rem; font-weight:bold; color:var(--accent); letter-spacing:1px;}


  .hourly-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px;}
  .hour-cell{
    background:#11141a; border:1px solid #2a2e37; border-radius:10px; padding:12px; text-align:center;
  }
  .hour-cell.current{border-color:var(--accent); background:rgba(245,166,35,0.12);}
  .hour-cell .hour-label{font-size:0.9rem; color:var(--muted); margin-bottom:8px; font-weight:bold;}
  .hour-cell .role-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .hour-cell .role-row .role-name{font-size:0.85rem; color:var(--muted);}
  .hour-cell .role-row .role-count{font-size:1.6rem; font-weight:bold;}
  .hour-cell .role-row.picker .role-count{color:#4caf50;}
  .hour-cell .role-row.packer .role-count{color:var(--accent);}
  .hour-cell.current .hour-label{color:var(--accent);}

  /* COMPARISON GRID */
  .compare-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:12px;}
  .compare-cell{
    background:#11141a; border:1px solid #2a2e37; border-radius:10px; padding:12px; text-align:center;
  }
  .compare-cell.current{border-color:var(--accent); background:rgba(245,166,35,0.12);}
  .compare-cell .hour-label{font-size:0.9rem; color:var(--muted); margin-bottom:8px; font-weight:bold;}
  .compare-cell.current .hour-label{color:var(--accent);}
  .compare-vals{display:flex; justify-content:space-around; align-items:baseline; margin-bottom:6px;}
  .compare-vals .today-val{font-size:1.8rem; font-weight:bold;}
  .compare-vals .yesterday-val{font-size:1.1rem; color:var(--muted);}
  .compare-delta{font-size:0.85rem; font-weight:bold;}
  .compare-delta.up{color:var(--green);}
  .compare-delta.down{color:var(--red);}
  .compare-delta.flat{color:var(--muted);}
  .compare-summary{display:flex; justify-content:center; gap:32px; margin-bottom:14px; flex-wrap:wrap;}
  .summary-box{text-align:center;}
  .summary-box .summary-label{font-size:0.85rem; color:var(--muted); margin-bottom:4px;}
  .summary-box .summary-val{font-size:2.2rem; font-weight:bold;}
  .summary-box .summary-val.today{color:var(--accent);}
  .summary-box .summary-val.yesterday{color:var(--muted);}
</style>
</head>
<body>

<h1>Warehouse Hourly Tracker</h1>
<div class="small">Shrus — Picking & Packing</div>

<div class="tabs">
  <div class="tab active" data-tab="entry">Log Entry</div>
  <div class="tab" data-tab="dashboard">Dashboard</div>
</div>

<!-- ENTRY (GRID) -->
<div class="panel active" id="entry">
  <div class="card">
    <div class="toolbar">
      <div>
        <label>Hour Slot</label>
        <select id="hour">
          <option>08:30-09:30</option>
          <option>09:30-10:30</option>
          <option>10:30-11:30</option>
          <option>11:30-12:30</option>
          <option>12:30-13:30</option>
          <option>13:30-14:30</option>
          <option>14:30-15:30</option>
          <option>15:30-16:30</option>
          <option>16:30-17:30</option>
        </select>
      </div>
      <div style="align-self:flex-end;">
        <button class="secondary" onclick="addRow()">+ Add Worker Row</button>
      </div>
      <div style="align-self:flex-end;">
        <button class="secondary" onclick="testAlarm()">🔊 Test Alarm</button>
      </div>
    </div>

    <div class="grid-wrap">
      <table class="grid-table" id="gridTable">
        <thead>
          <tr>
            <th class="worker-col">Worker</th>
            <th>Role</th>
            <th>Count</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="gridBody"></tbody>
      </table>
    </div>

    <div style="margin-top:12px;">
      <button id="submitBtn" onclick="submitAll()">Save All for this Hour</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="panel" id="dashboard">
  <div class="dash-header">
    <div>
      <label>Filter by Date</label>
      <input type="date" id="filterDate">
    </div>
    <button onclick="loadData()">Refresh</button>
    <div class="live-clock" id="liveClock"></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Hourly Picking & Packing Count</h3>
    <div id="hourlyGrid"></div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">Today vs Previous Day — Total Output</h3>
    <div id="compareGrid"></div>
  </div>
</div>

<script>
// === CONFIG ===
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQErQMXtrqEJNh4eu9xaXTX3U1_s4vKVezTHS_gcBrB8I9WC-gHFbSzZclux8B3kGyyQ/exec";

// tab switching
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
    if(tab.dataset.tab==='dashboard') loadData();
  };
});

function todayStr(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
}
function todayDDMMYYYY(){
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+"/"+String(d.getMonth()+1).padStart(2,'0')+"/"+d.getFullYear();
}
document.getElementById('filterDate').value = todayStr();

// ===== GRID ENTRY =====
function saveWorkerList(names){
  localStorage.setItem('workerNames', JSON.stringify(names));
}
function getWorkerList(){
  return JSON.parse(localStorage.getItem('workerNames')||'[]');
}

function addRow(name="", role="Picker"){
  const tbody = document.getElementById('gridBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="worker-col"><input type="text" class="worker-name" value="${name}" placeholder="Worker name"></td>
    <td><select class="worker-role">
      <option value="Picker" ${role==='Picker'?'selected':''}>Picker</option>
      <option value="Packer" ${role==='Packer'?'selected':''}>Packer</option>
    </select></td>
    <td><input type="number" class="worker-count" min="0" placeholder="0"></td>
    <td><button class="remove-btn" onclick="this.closest('tr').remove()">×</button></td>
  `;
  tbody.appendChild(tr);
}

// initialize grid with saved workers, or 3 blank rows
function initGrid(){
  const tbody = document.getElementById('gridBody');
  tbody.innerHTML = '';
  const saved = getWorkerList();
  if(saved.length){
    saved.forEach(w => addRow(w.name, w.role));
  } else {
    addRow(); addRow(); addRow();
  }
}
initGrid();

// Disable hour slots whose end time + 10 min grace period has passed
function updateHourSlotAvailability(){
  const hourSelect = document.getElementById('hour');
  const slots = [
    {label:"08:30-09:30", endH:9, endM:30},
    {label:"09:30-10:30", endH:10, endM:30},
    {label:"10:30-11:30", endH:11, endM:30},
    {label:"11:30-12:30", endH:12, endM:30},
    {label:"12:30-13:30", endH:13, endM:30},
    {label:"13:30-14:30", endH:14, endM:30},
    {label:"14:30-15:30", endH:15, endM:30},
    {label:"15:30-16:30", endH:16, endM:30},
    {label:"16:30-17:30", endH:17, endM:30},
  ];
  const now = new Date();
  let firstEnabledValue = null;

  Array.from(hourSelect.options).forEach((opt, i)=>{
    const slot = slots[i];
    const cutoff = new Date(now);
    cutoff.setHours(slot.endH, slot.endM + 10, 0, 0); // end time + 10 min grace
    const expired = now > cutoff;
    opt.disabled = expired;
    if(!expired && firstEnabledValue === null){
      firstEnabledValue = opt.value;
    }
  });

  // If currently selected option is now disabled, jump to first available one
  if(hourSelect.options[hourSelect.selectedIndex].disabled && firstEnabledValue){
    hourSelect.value = firstEnabledValue;
  }
}
updateHourSlotAvailability();
setInterval(updateHourSlotAvailability, 60000); // recheck every minute

// ===== ALARM SYSTEM =====
// Plays a beep at the start of each hour slot, and again 10 min before
// the entry window closes (i.e. at the slot's end time) as a reminder.
function playBeep(times=1){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  let t = ctx.currentTime;
  for(let i=0;i<times;i++){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.5, t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t+0.45);
    t += 0.55;
  }
}

// Test button: plays the "slot start" alarm (2 beeps) so staff can confirm sound works
function testAlarm(){
  playBeep(2);
}

const ALARM_SLOT_BOUNDS = [
  {start:"08:30", end:"09:30"},
  {start:"09:30", end:"10:30"},
  {start:"10:30", end:"11:30"},
  {start:"11:30", end:"12:30"},
  {start:"12:30", end:"13:30"},
  {start:"13:30", end:"14:30"},
  {start:"14:30", end:"15:30"},
  {start:"15:30", end:"16:30"},
  {start:"16:30", end:"17:30"},
];

let lastAlarmKey = localStorage.getItem('lastAlarmKey') || '';

function checkAlarms(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const nowStr = hh+":"+mm;

  ALARM_SLOT_BOUNDS.forEach(b=>{
    // new hour slot started -> 2 beeps
    if(nowStr === b.start){
      const key = 'start-'+b.start;
      if(lastAlarmKey !== key){
        playBeep(2);
        lastAlarmKey = key;
        localStorage.setItem('lastAlarmKey', key);
      }
    }
    // slot ended -> 10 min reminder to finish entry, 3 beeps
    if(nowStr === b.end){
      const key = 'end-'+b.end;
      if(lastAlarmKey !== key){
        playBeep(3);
        lastAlarmKey = key;
        localStorage.setItem('lastAlarmKey', key);
      }
    }
  });
}
setInterval(checkAlarms, 30000); // check twice a minute
checkAlarms();

function submitAll(){
  const msg = document.getElementById('msg');
  if(SCRIPT_URL.includes("PASTE_")){
    msg.textContent = "Set SCRIPT_URL in the code first.";
    msg.style.color = "var(--red)";
    return;
  }
  const hour = document.getElementById('hour').value;
  const date = todayDDMMYYYY();
  const rows = document.querySelectorAll('#gridBody tr');

  const entries = [];
  const workerListForSave = [];
  rows.forEach(row=>{
    const name = row.querySelector('.worker-name').value.trim();
    const role = row.querySelector('.worker-role').value;
    const count = row.querySelector('.worker-count').value;
    if(name) workerListForSave.push({name, role});
    if(name && count !== ""){
      entries.push({date, hour, worker:name, role, count});
    }
  });

  if(entries.length === 0){
    msg.textContent = "Enter at least one worker + count.";
    msg.style.color = "var(--red)";
    return;
  }

  saveWorkerList(workerListForSave);

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  msg.textContent = `Saving ${entries.length} entries...`;
  msg.style.color = "var(--muted)";

  // send sequentially
  let i = 0;
  function sendNext(){
    if(i >= entries.length){
      msg.textContent = `✓ Saved ${entries.length} entries for ${hour}!`;
      msg.style.color = "var(--green)";
      btn.disabled = false;
      // clear counts only
      document.querySelectorAll('.worker-count').forEach(inp=>inp.value='');
      return;
    }
    fetch(SCRIPT_URL, {
      method:"POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(entries[i])
    })
      .then(r=>r.json())
      .then(()=>{ i++; sendNext(); })
      .catch(err=>{
        msg.textContent = "Error: " + err;
        msg.style.color = "var(--red)";
        btn.disabled = false;
      });
  }
  sendNext();
}

// ===== DASHBOARD =====
function normalizeDate(val){
  // val could be "dd/mm/yyyy", "yyyy-mm-dd", or ISO UTC datetime from Sheets
  if(val instanceof Date) val = val.toISOString();
  val = String(val).trim();
  if(val.includes('/')){
    const [d,m,y] = val.split('/');
    return y+"-"+m.padStart(2,'0')+"-"+d.padStart(2,'0');
  }
  if(val.includes('T')){
    // It's a UTC timestamp representing IST midnight - add 5:30 to correct the date
    const d = new Date(val);
    d.setMinutes(d.getMinutes() + 330); // IST offset
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
  }
  return val; // already yyyy-mm-dd
}

function loadData(){
  if(SCRIPT_URL.includes("PASTE_")) return;

  // remove any previous jsonp script tag
  const old = document.getElementById('jsonp-script');
  if(old) old.remove();

  window.__jsonpCallback = function(data){
    renderDashboard(data);
  };

  const script = document.createElement('script');
  script.id = 'jsonp-script';
  script.src = SCRIPT_URL + "?callback=__jsonpCallback&t=" + Date.now();
  script.onerror = function(){
    document.getElementById('pickerLeaders').innerHTML = '<div class="small">Error loading data (check SCRIPT_URL)</div>';
  };
  document.body.appendChild(script);
}

const HOUR_SLOTS = [
  "08:30-09:30","09:30-10:30","10:30-11:30","11:30-12:30","12:30-13:30",
  "13:30-14:30","14:30-15:30","15:30-16:30","16:30-17:30"
];

function getCurrentSlot(){
  const now = new Date();
  const minutes = now.getHours()*60 + now.getMinutes();
  for(const slot of HOUR_SLOTS){
    const [start, end] = slot.split('-');
    const [sh, sm] = start.split(':').map(Number);
    const [eh, em] = end.split(':').map(Number);
    const startMin = sh*60+sm, endMin = eh*60+em;
    if(minutes >= startMin && minutes < endMin) return slot;
  }
  return null;
}

function renderDashboard(data){
  const filterDate = document.getElementById('filterDate').value; // yyyy-mm-dd
  const filtered = data.filter(row => normalizeDate(row.Date) === filterDate);

  // hourly totals split by role
  const hourly = {}; // { "08:30-09:30": {Picker: n, Packer: n} }
  HOUR_SLOTS.forEach(s => hourly[s] = {Picker:0, Packer:0});
  filtered.forEach(row=>{
    if(!hourly[row.Hour]) hourly[row.Hour] = {Picker:0, Packer:0};
    const role = row.Role === 'Packer' ? 'Packer' : 'Picker';
    hourly[row.Hour][role] += Number(row.Count);
  });

  const currentSlot = getCurrentSlot();
  const hourlyGrid = document.getElementById('hourlyGrid');
  if(hourlyGrid){
  hourlyGrid.className = 'hourly-grid';
  hourlyGrid.innerHTML = HOUR_SLOTS.map(slot=>{
    const counts = hourly[slot] || {Picker:0, Packer:0};
    const isCurrent = slot === currentSlot ? ' current' : '';
    return `<div class="hour-cell${isCurrent}">
      <div class="hour-label">${slot}</div>
      <div class="role-row picker"><span class="role-name">Picked</span><span class="role-count">${counts.Picker}</span></div>
      <div class="role-row packer"><span class="role-name">Packed</span><span class="role-count">${counts.Packer}</span></div>
    </div>`;
  }).join('');
  }

  // ===== Previous day comparison =====
  const prevDateObj = new Date(filterDate + "T00:00:00");
  prevDateObj.setDate(prevDateObj.getDate() - 1);
  const prevDate = prevDateObj.getFullYear()+"-"+String(prevDateObj.getMonth()+1).padStart(2,'0')+"-"+String(prevDateObj.getDate()).padStart(2,'0');

  const prevFiltered = data.filter(row => normalizeDate(row.Date) === prevDate);
  const prevHourly = {};
  HOUR_SLOTS.forEach(s => prevHourly[s] = 0);
  prevFiltered.forEach(row=>{
    prevHourly[row.Hour] = (prevHourly[row.Hour]||0) + Number(row.Count);
  });

  const todayHourlyTotal = {};
  HOUR_SLOTS.forEach(s => todayHourlyTotal[s] = (hourly[s].Picker + hourly[s].Packer));

  const compareGrid = document.getElementById('compareGrid');
  if(compareGrid){
  compareGrid.className = 'compare-grid';

  // overall summary
  const todaySum = Object.values(todayHourlyTotal).reduce((a,b)=>a+b,0);
  const prevSum = Object.values(prevHourly).reduce((a,b)=>a+b,0);
  const diffPct = prevSum > 0 ? Math.round((todaySum-prevSum)/prevSum*100) : (todaySum>0?100:0);
  const diffClass = diffPct>0?'up':diffPct<0?'down':'flat';
  const diffSign = diffPct>0?'+':'';

  let html = `<div class="compare-summary">
    <div class="summary-box"><div class="summary-label">Today Total</div><div class="summary-val today">${todaySum}</div></div>
    <div class="summary-box"><div class="summary-label">Previous Day Total</div><div class="summary-val yesterday">${prevSum}</div></div>
    <div class="summary-box"><div class="summary-label">Change</div><div class="summary-val ${diffClass}">${diffSign}${diffPct}%</div></div>
  </div>`;

  html += HOUR_SLOTS.map(slot=>{
    const todayVal = todayHourlyTotal[slot];
    const prevVal = prevHourly[slot] || 0;
    const delta = todayVal - prevVal;
    const dClass = delta>0?'up':delta<0?'down':'flat';
    const arrow = delta>0?'▲':delta<0?'▼':'–';
    const isCurrent = slot === currentSlot ? ' current' : '';
    return `<div class="compare-cell${isCurrent}">
      <div class="hour-label">${slot}</div>
      <div class="compare-vals">
        <span class="today-val">${todayVal}</span>
        <span class="yesterday-val">prev: ${prevVal}</span>
      </div>
      <div class="compare-delta ${dClass}">${arrow} ${Math.abs(delta)}</div>
    </div>`;
  }).join('');

  compareGrid.innerHTML = html;
  }
}

// live clock
function updateClock(){
  const el = document.getElementById('liveClock');
  if(el) el.textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// auto-refresh dashboard every 60s when visible
setInterval(()=>{
  if(document.getElementById('dashboard').classList.contains('active')){
    loadData();
  }
}, 60000);
</script>

</body>
</html>
